<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play With AI - Windows 98 Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.2), transparent 34%),
                linear-gradient(180deg, #0b7d7d 0%, #0a6666 100%);
            font-family: "Pixelated MS Sans Serif", "MS Sans Serif", sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        .desktop-window {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .desktop-window .window-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px;
        }

        .workspace {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .tabpanel-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .tabpanel-inner {
            flex: 1;
            min-height: 0;
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        .chat-layout {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            gap: 6px;
        }

        .sidebar {
            width: 270px;
            flex: 0 0 270px;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #btnNewChat {
            width: 100%;
        }

        .sidebar-splitter {
            width: 7px;
            cursor: col-resize;
            background: #c0c0c0;
            box-shadow:
                inset -1px -1px #0a0a0a,
                inset 1px 1px #ffffff,
                inset -2px -2px grey,
                inset 2px 2px #dfdfdf;
        }

        .sidebar select,
        .settings-list {
            width: 100%;
            min-height: 0;
            flex: 1;
        }

        .list-panel {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 2px;
            background: #fff;
        }

        .list-panel table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        .list-panel thead th {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .main-chat-area {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 14px;
        }

        .toolbar-panel {
            padding: 4px 6px;
            background: #c0c0c0;
            box-shadow:
                inset -1px -1px #0a0a0a,
                inset 1px 1px #ffffff,
                inset -2px -2px grey,
                inset 2px 2px #dfdfdf;
        }

        .chat-toolbar .divider {
            width: 1px;
            height: 18px;
            background: #808080;
            box-shadow: 1px 0 0 #ffffff;
        }

        #fontSizeRange {
            width: 120px;
        }

        .chat-split {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-history {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            padding: 10px;
            background: #fff;
            height: 100%;
        }

        .chat-splitter {
            height: 7px;
            cursor: row-resize;
            background: #c0c0c0;
            box-shadow:
                inset -1px -1px #0a0a0a,
                inset 1px 1px #ffffff,
                inset -2px -2px grey,
                inset 2px 2px #dfdfdf;
        }

        .message {
            padding: 6px 8px;
            margin-bottom: 8px;
            border: 1px solid #c0c0c0;
            background: #f8f8f8;
        }

        .message-header {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-content {
            line-height: 1.4;
            word-break: break-word;
        }

        .message-content :is(p, ul, ol, pre, blockquote) {
            margin-top: 0;
            margin-bottom: 0.75em;
        }

        .message-content :is(p:last-child, ul:last-child, ol:last-child, pre:last-child, blockquote:last-child) {
            margin-bottom: 0;
        }

        .message-you .message-header {
            color: #000080;
        }

        .message-ai .message-header {
            color: #008000;
        }

        .message-system .message-header {
            color: #800000;
        }

        .composer {
            display: flex;
            gap: 8px;
            align-items: stretch;
            min-height: 110px;
        }

        #userInput {
            flex: 1;
            resize: none;
            min-height: 96px;
            height: 110px;
            max-height: 260px;
        }

        .settings-layout {
            flex: 1;
            min-height: 0;
            display: flex;
            gap: 10px;
        }

        .settings-column {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-column:first-child {
            flex: 0 0 42%;
        }

        .settings-column:last-child {
            flex: 1 1 auto;
        }

        .settings-list {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .settings-inline {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .settings-inline label {
            white-space: nowrap;
        }

        .settings-inline input[type="text"] {
            width: 220px;
        }

        .settings-inline input[type="password"] {
            width: 320px;
        }

        #sessionPanel,
        #keyPanel {
            background: #fff;
            color: #000;
        }

        .toolbar-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .grow {
            flex: 1;
        }

        textarea,
        input,
        select,
        button {
            font-family: "Pixelated MS Sans Serif", "MS Sans Serif", sans-serif;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
        }

        .status-bar-field {
            user-select: none;
        }

        [hidden] {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="window desktop-window">
    <div class="title-bar">
        <div class="title-bar-text">Play With AI - Gemini (Windows 98)</div>
        <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
        </div>
    </div>

    <div class="window-body">
        <menu role="tablist" aria-label="Play With AI tabs">
            <li role="tab" aria-selected="true" id="tab-chat" data-tab="chat"><a href="#chat-panel">Hội thoại AI</a></li>
            <li role="tab" aria-selected="false" id="tab-settings" data-tab="settings"><a href="#settings-panel">Cài đặt Hệ thống</a></li>
        </menu>

        <div class="workspace">
            <article class="window tabpanel-shell" role="tabpanel" id="chat-panel" aria-labelledby="tab-chat">
                <div class="tabpanel-inner">
                    <div class="chat-layout">
                        <div class="sidebar" id="chatSidebar">
                            <button id="btnNewChat"><strong>New Chat</strong></button>
                            <div class="sunken-panel list-panel" id="sessionPanel" aria-label="Session list">
                                <table class="interactive" id="sessionTable">
                                    <thead>
                                    <tr>
                                        <th>Tên đoạn chat</th>
                                    </tr>
                                    </thead>
                                    <tbody id="sessionTableBody"></tbody>
                                </table>
                            </div>
                            <div class="toolbar-actions">
                                <button id="btnRename" class="grow">Rename</button>
                                <button id="btnDelete" class="grow">Delete</button>
                            </div>
                        </div>

                        <div class="sidebar-splitter" id="sidebarSplitter" title="Keo de thay doi chieu rong"></div>

                        <div class="main-chat-area">
                            <div class="toolbar-panel chat-toolbar">
                                <div class="field-row">
                                    <label for="fontSelect"><strong>Font</strong></label>
                                    <select id="fontSelect">
                                        <option value="MS Sans Serif" selected>MS Sans Serif</option>
                                        <option value="Times New Roman">Times New Roman</option>
                                        <option value="Arial">Arial</option>
                                        <option value="Tahoma">Tahoma</option>
                                        <option value="Courier New">Courier New</option>
                                        <option value="Comic Sans MS">Comic Sans MS</option>
                                    </select>
                                </div>
                                <div class="field-row">
                                    <label for="fontSizeRange"><strong>Size</strong></label>
                                    <input id="fontSizeRange" type="range" min="8" max="24" value="12">
                                    <span id="fontSizeLabel">12</span>
                                </div>
                                <div class="divider" aria-hidden="true"></div>
                                <div class="field-row">
                                    <label for="modelSelect"><strong>Model</strong></label>
                                    <select id="modelSelect">
                                        <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                                        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                                        <option value="gemini-1.5-pro-latest">gemini-1.5-pro-latest</option>
                                    </select>
                                </div>
                            </div>

                            <div class="chat-split" id="chatSplit">
                                <div class="sunken-panel chat-history" id="chatArea" aria-live="polite"></div>
                                <div class="chat-splitter" id="chatSplitter" title="Keo de thay doi chieu cao"></div>
                                <div class="composer" id="chatComposer">
                                    <textarea id="userInput" rows="4" placeholder="Type a message. Ctrl+Enter sends."></textarea>
                                    <button id="btnSend"><strong>Send</strong></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </article>

            <article class="window tabpanel-shell" role="tabpanel" id="settings-panel" aria-labelledby="tab-settings" hidden>
                <div class="tabpanel-inner">
                    <div class="settings-layout">
                        <fieldset class="settings-column">
                            <legend>Danh sách API Key</legend>
                            <div class="sunken-panel list-panel" id="keyPanel" aria-label="API key list">
                                <table class="interactive" id="keyTable">
                                    <thead>
                                    <tr>
                                        <th>Tên key</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                    </thead>
                                    <tbody id="keyTableBody"></tbody>
                                </table>
                            </div>
                            <div class="settings-actions">
                                <button id="btnSetKey" class="grow">Chọn làm Mặc định</button>
                                <button id="btnDelKey" class="grow">Xóa Key</button>
                            </div>
                        </fieldset>

                        <fieldset class="settings-column">
                            <legend>Thêm Key Dự phòng</legend>
                            <div class="settings-inline">
                                <label for="keyName">Tên gợi nhớ (VD: Key chính):</label>
                                <input id="keyName" type="text" autocomplete="off" spellcheck="false">
                                <label for="keyValue">Mã API Key:</label>
                                <input id="keyValue" type="password" autocomplete="off" spellcheck="false">
                                <button id="btnAddKey">Thêm Key mới</button>
                            </div>
                        </fieldset>
                    </div>
                </div>
            </article>
        </div>
    </div>

    <div class="status-bar">
        <p class="status-bar-field" id="statusText">Ready</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
